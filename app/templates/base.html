<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }}</title>
  <link href="/static/vendor/bootstrap.min.css" rel="stylesheet">
  <link href="/static/vendor/bootstrap-reboot.min.css" rel="stylesheet">
  <link href="/static/vendor/bootstrap-grid.min.css" rel="stylesheet">
  <link href="/static/main.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/vendor/bootstrap-icons.min.css">
  <script src="/static/vendor/jquery-3.0.0.min.js"></script>
  <script src="/static/vendor/bootstrap.bundle.min.js"></script>
  {% block head %}{% endblock %}
</head>
<body>
  <header>
    {% if navigation %}
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
      <h1><a class="navbar-brand" href="#">{{ title }}</a></h1>
      <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav mr-auto">
          {% for item in navigation %}
          <li class="nav-item active"><a class="nav-link" href="{{ item.href }}">{{ item.label }}</a></li>
          {% endfor %}
      </div>
    </nav>
    {% endif %}
  </header>
  <main class="container">
    {% block content %}{{ content_text }}{% endblock %}
  </main>

  <footer class="container-fluid bg-light">
    <div class="row">
      <div class="col-sm">
        {{ copyright }}
      </div>
      <div class="col-sm">
        {{ site_info }}
      </div>
      <div class="col-sm">
        {{ contact }}
      </div>
      <div class="col-sm">
        {{ attribution }}
      </div>
    </div>
  </footer>
</body>
</html>
