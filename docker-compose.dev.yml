services:
  app:
    build:
      target: dev
    volumes:
      - ./app/app:/opt/bacmet/app
    depends_on:
      frontend:
        condition: service_healthy

  frontend:
    build:
      dockerfile: frontend/Dockerfile
    volumes:
      - ./frontend/bacmet:/opt/bacmet/frontend
    healthcheck:
      test: [ "CMD", "wget", "--tries=1", "--spider", "--quiet", "http://frontend:3000/health-check" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
