name: bacmet-dev

services:
  app:
    build:
      target: dev
      args:
        UID: "${UID:-1000}"
        GID: "${GID:-1000}"
    volumes:
      - ./app/app:/home/bacmet/app
    depends_on:
      frontend:
        condition: service_healthy
    restart: no

  frontend:
    build:
      dockerfile: frontend/Dockerfile
      args:
        UID: "${UID:-1000}"
        GID: "${GID:-1000}"
    volumes:
      - ./frontend/bacmet:/home/bacmet/frontend
    healthcheck:
      test: [ "CMD", "wget", "--tries=1", "--spider", "--quiet", "http://frontend:3000/health-check" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: no

volumes:
  vol:
    external: true
    name: bacmet_vol
