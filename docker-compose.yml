name: bacmet

services:

  app:
    build:
      dockerfile: app/Dockerfile
      target: prod
    ports:
      - ${APP_HOST:-0.0.0.0}:${APP_PORT:-5000}:8080
    volumes:
      - vol:/home/bacmet/vol
    healthcheck:
      test: [ "CMD", "wget", "--tries=1", "--spider", "--quiet", "http://app:8080/api/health-check" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: always

volumes:
  vol:
