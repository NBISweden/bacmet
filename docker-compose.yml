name: bacmet

services:

  app:
    build:
      dockerfile: app/Dockerfile
      target: prod
    ports:
      - ${APP_HOST:-127.0.0.1}:${APP_PORT:-5000}:8080
    volumes:
      - data:/home/bacmet/data
      - caddy:/home/bacmet/caddy
    healthcheck:
      test: [ "CMD", "wget", "--tries=1", "--spider", "--quiet", "http://app:5000/api/health-check" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  data:
  caddy:
